apiVersion: v1
kind: ServiceAccount
metadata:
  name: gdc-dashboard-sa
  # namespace: your-namespace # Namespace will be applied strictly at apply time or via kustomize
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gdc-dashboard-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets", "serviceaccounts", "events", "resourcequotas", "limitranges", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create", "get"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments/scale", "statefulsets/scale"]
  verbs: ["patch", "update"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "clusterroles", "rolebindings", "clusterrolebindings"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies", "ingresses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.istio.io"]
  resources: ["virtualservices", "destinationrules", "gateways"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["security.istio.io"]
  resources: ["peerauthentications"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gdc-dashboard-rb
subjects:
- kind: ServiceAccount
  name: gdc-dashboard-sa
  # namespace: default # defaults to current namespace, but kept if user wants to be explicit
roleRef:
  kind: Role
  name: gdc-dashboard-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gdc-dashboard
  # namespace: your-namespace
  labels:
    app: gdc-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gdc-dashboard
  template:
    metadata:
      labels:
        app: gdc-dashboard
    spec:
      serviceAccountName: gdc-dashboard-sa
      containers:
      - name: dashboard
        image: gdc-dashboard:latest # Replace with your actual image registry path
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        # Liveness: ultra-lightweight — no K8s or Gemini calls.
        # If this fails, the Flask worker is truly dead → restart pod.
        # Tuned for AI-heavy workloads: Gemini calls can take 30-120s and
        # may temporarily block gevent workers from answering probes.
        livenessProbe:
          httpGet:
            path: /api/ping
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 6      # Allow 6 failures (90s) before killing
          successThreshold: 1
        # Readiness: lightweight health check — no Gemini calls.
        # Keeps pod out of Service endpoints while starting up or overloaded.
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 6      # 60s of failures → stop routing traffic
          successThreshold: 1
        # Startup: give the app up to 120s to initialize (Gemini SDK,
        # K8s client, etc.) before liveness/readiness probes kick in.
        startupProbe:
          httpGet:
            path: /api/ping
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 24     # 5 * 24 = 120s max startup time
        resources:
          requests:
            cpu: 250m              # scheduler guarantee (100m too low for 4 workers)
            memory: 512Mi
          limits:
            cpu: "2"               # CRITICAL: 500m causes throttling during AI calls
            memory: 4Gi            #   → probes can't respond → pod killed
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # ── Splunk MCP Integration ──────────────────────────────
        # Points to the Splunk MCP server's ClusterIP service.
        # The Splunk MCP server must be deployed in the same namespace
        # (or use the full DNS: splunk-mcp-service.<namespace>.svc.cluster.local)
        #
        # To deploy the Splunk MCP server:
        #   kubectl apply -f ../mcps/services/mcp_splunk/manifests/deploy.yaml -n YOUR_NAMESPACE
        #
        # For cross-namespace access, use:
        #   http://splunk-mcp-service.OTHER_NAMESPACE.svc.cluster.local:8080
        - name: SPLUNK_MCP_URL
          value: "http://splunk-mcp-service:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: gdc-dashboard-svc
  # namespace: your-namespace
spec:
  selector:
    app: gdc-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
